<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="R2L captures real-world video data for humanoids and robots.">
    <title>Ready 2 Learn</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=mobile-ready-40">
  </head>
  <body>
    <div class="scroll-indicator" aria-hidden="true">
      <span></span>
    </div>
    <main>
      <section class="intro-sequence" aria-label="R2L data journey">
        <div class="intro-sticky">
          <div class="artboard">
            <div class="landing-panel">
              <video data-video-playlist="landingpage" src="assets/videos/landingpage/L1.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <img src="assets/r2l-wordmark-white-cropped.png" alt="R2L">
            </div>

            <div class="mini-grid" aria-hidden="true">
              <div class="side-column side-left">
                <div class="video-slot" style="--x:-70vw;--y:-12vh"><video class="is-active" src="assets/videos/wall-videos/W10.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
                <div class="video-slot" style="--x:-76vw;--y:0vh"><video class="is-active" src="assets/videos/wall-videos/W11.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
                <div class="video-slot" style="--x:-70vw;--y:14vh"><video class="is-active" src="assets/videos/wall-videos/W12.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              </div>
              <div class="video-slot" style="--col:1;--row:1;--x:-44vw;--y:-12vh"><video class="is-active" src="assets/videos/wall-videos/W1.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="video-slot" style="--col:2;--row:1;--x:0vw;--y:-18vh"><video class="is-active" src="assets/videos/wall-videos/W2.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="video-slot" style="--col:3;--row:1;--x:44vw;--y:-12vh"><video class="is-active" src="assets/videos/wall-videos/W3.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="video-slot" style="--col:1;--row:2;--x:-54vw;--y:0vh"><video class="is-active" src="assets/videos/wall-videos/W4.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="video-slot is-center-placeholder" style="--col:2;--row:2;--x:0vw;--y:0vh"><video class="is-active" src="assets/videos/wall-videos/W5.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="video-slot" style="--col:3;--row:2;--x:54vw;--y:0vh"><video class="is-active" src="assets/videos/wall-videos/W6.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="video-slot" style="--col:1;--row:3;--x:-44vw;--y:14vh"><video class="is-active" src="assets/videos/wall-videos/W7.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="video-slot" style="--col:2;--row:3;--x:0vw;--y:20vh"><video class="is-active" src="assets/videos/wall-videos/W8.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="video-slot" style="--col:3;--row:3;--x:44vw;--y:14vh"><video class="is-active" src="assets/videos/wall-videos/W9.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              <div class="side-column side-right">
                <div class="video-slot" style="--x:70vw;--y:-12vh"><video class="is-active" src="assets/videos/wall-videos/W13.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
                <div class="video-slot" style="--x:76vw;--y:0vh"><video class="is-active" src="assets/videos/wall-videos/W14.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
                <div class="video-slot" style="--x:70vw;--y:14vh"><video class="is-active" src="assets/videos/wall-videos/W15.mp4" muted autoplay playsinline preload="metadata"></video><video class="is-buffering" muted playsinline preload="auto"></video></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="data-title" aria-label="Data collection methods">
        <h1>
          <span class="word data">Data</span>
          <span class="word collection">Collection</span>
          <span class="word methods">Methods</span>
        </h1>
      </section>

      <section class="method method-one" aria-labelledby="ego-title">
        <div class="method-stage">
          <h2 id="ego-title">Egocentric</h2>
          <div class="method-video-frame"><video data-video-playlist="egocentricData" src="assets/videos/egocentric-data/E1_Making a video.mp4" muted loop playsinline preload="none"></video></div>
        </div>
      </section>

      <section class="method method-two" aria-labelledby="leader-title">
        <div class="method-stage">
          <h2 id="leader-title">Leader - Follower</h2>
          <div class="method-video-frame"><video data-video-playlist="leaderFollower" src="assets/videos/leader-follower/A1_Putting the ball in the cup.mp4" muted loop playsinline preload="none"></video></div>
        </div>
      </section>

      <section class="method method-three" aria-labelledby="remote-title">
        <div class="method-stage">
          <h2 id="remote-title">Remote Control</h2>
          <div class="method-video-frame"><video data-video-playlist="remoteControl" src="assets/videos/remote-control/R1_Remote controled robotarm.mp4" muted loop playsinline preload="none"></video></div>
        </div>
      </section>

      <section class="method simulator" aria-labelledby="sim-title">
        <div class="method-stage">
          <h2 id="sim-title">Simulator</h2>
          <div class="method-video-frame"><video data-video-playlist="simulator" src="assets/videos/simulator/sally-recording-2026-06-27T08-22-06.mp4" muted loop playsinline preload="none"></video></div>
        </div>
      </section>
    </main>

    <script src="script.js?v=wall-double-buffer-49"></script>
  </body>
</html>
