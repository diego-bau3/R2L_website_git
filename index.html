<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="R2L captures real-world video data for humanoids and robots.">
    <title>Ready 2 Learn</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=mobile-ready-40">
  </head>
  <body>
    <div class="scroll-indicator" aria-hidden="true">
      <span></span>
    </div>
    <main>
      <section class="intro-sequence" aria-label="R2L data journey">
        <div class="intro-sticky">
          <div class="artboard">
            <div class="landing-panel">
              <video src="assets/videos/leader-follower/landing-01.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <img src="assets/r2l-wordmark-white-cropped.png" alt="R2L">
            </div>

            <div class="mini-grid" aria-hidden="true">
              <div class="side-column side-left">
                <video style="--x:-70vw;--y:-12vh" src="assets/videos/wall-videos/wall-11.mp4" muted autoplay loop playsinline preload="metadata"></video>
                <video style="--x:-76vw;--y:0vh" src="assets/videos/wall-videos/wall-12.mp4" muted autoplay loop playsinline preload="metadata"></video>
                <video style="--x:-70vw;--y:14vh" src="assets/videos/wall-videos/wall-13.mp4" muted autoplay loop playsinline preload="metadata"></video>
              </div>
              <video style="--x:-44vw;--y:-12vh" src="assets/videos/wall-videos/wall-01.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <video style="--x:0vw;--y:-18vh" src="assets/videos/wall-videos/wall-02.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <video style="--x:44vw;--y:-12vh" src="assets/videos/wall-videos/wall-03.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <video style="--x:-54vw;--y:0vh" src="assets/videos/wall-videos/wall-04.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <video style="--x:0vw;--y:0vh" src="assets/videos/leader-follower/landing-01.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <video style="--x:54vw;--y:0vh" src="assets/videos/wall-videos/wall-07.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <video style="--x:-44vw;--y:14vh" src="assets/videos/wall-videos/wall-08.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <video style="--x:0vw;--y:20vh" src="assets/videos/wall-videos/wall-09.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <video style="--x:44vw;--y:14vh" src="assets/videos/wall-videos/wall-10.mp4" muted autoplay loop playsinline preload="metadata"></video>
              <div class="side-column side-right">
                <video style="--x:70vw;--y:-12vh" src="assets/videos/wall-videos/wall-11.mp4" muted autoplay loop playsinline preload="metadata"></video>
                <video style="--x:76vw;--y:0vh" src="assets/videos/wall-videos/wall-12.mp4" muted autoplay loop playsinline preload="metadata"></video>
                <video style="--x:70vw;--y:14vh" src="assets/videos/wall-videos/wall-13.mp4" muted autoplay loop playsinline preload="metadata"></video>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="data-title" aria-label="Data collection methods">
        <h1>
          <span class="word data">Data</span>
          <span class="word collection">Collection</span>
          <span class="word methods">Methods</span>
        </h1>
      </section>

      <section class="method method-one" aria-labelledby="ego-title">
        <div class="method-stage">
          <h2 id="ego-title">Egocentric</h2>
          <video data-video-playlist="egocentricData" src="assets/videos/egocentric-data/x_20260517_232828.mp4" muted autoplay loop playsinline preload="metadata"></video>
        </div>
      </section>

      <section class="method method-two" aria-labelledby="leader-title">
        <div class="method-stage">
          <h2 id="leader-title">Leader - Follower</h2>
          <video data-video-playlist="leaderFollower" src="assets/videos/leader-follower/leader-follower-01.mp4" muted autoplay loop playsinline preload="metadata"></video>
        </div>
      </section>

      <section class="method method-three" aria-labelledby="remote-title">
        <div class="method-stage">
          <h2 id="remote-title">Remote Control</h2>
          <video data-video-playlist="remoteControl" src="assets/videos/remote-control/WhatsApp Video 2026-06-13 at 15.25.18.mp4" muted autoplay loop playsinline preload="metadata"></video>
        </div>
      </section>

      <section class="method simulator" aria-labelledby="sim-title">
        <div class="method-stage">
          <h2 id="sim-title">Simulator</h2>
          <video data-video-playlist="simulator" src="assets/videos/simulator/x_20260514_230009.mp4" muted autoplay loop playsinline preload="metadata"></video>
        </div>
      </section>
    </main>

    <script src="script.js?v=mobile-ready-40"></script>
  </body>
</html>
