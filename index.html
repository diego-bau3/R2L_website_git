<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="R2L captures real-world video data for humanoids and robots.">
    <title>R2L | Real-world robot data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=static-method-cards">
  </head>
  <body>
    <main>
      <section class="hero" aria-label="R2L">
        <video class="hero-video" src="assets/videos/landing/landing-01.mp4" muted autoplay loop playsinline preload="metadata"></video>
        <img class="hero-logo" src="assets/r2l-wordmark-white.png" alt="R2L">
      </section>

      <section class="method method-one" aria-labelledby="method-one-title">
        <div class="method-stage">
          <div class="method-video-wrap">
            <video src="assets/videos/wall/wall-03.mp4" muted autoplay loop playsinline preload="metadata"></video>
          </div>
          <h1 id="method-one-title">Leader / Follower</h1>
        </div>
      </section>

      <section class="method method-two" aria-labelledby="method-two-title">
        <div class="method-stage">
          <div class="method-video-wrap">
            <video src="assets/videos/wall/wall-06.mp4" muted autoplay loop playsinline preload="metadata"></video>
          </div>
          <h1 id="method-two-title">Remote Control</h1>
        </div>
      </section>

      <section class="method method-three" aria-labelledby="method-three-title">
        <div class="method-stage">
          <div class="method-video-wrap">
            <video src="assets/videos/wall/wall-11.mp4" muted autoplay loop playsinline preload="metadata"></video>
          </div>
          <h1 id="method-three-title">Egocentric Video</h1>
        </div>
      </section>
    </main>

    <script src="script.js?v=static-method-cards"></script>
  </body>
</html>
